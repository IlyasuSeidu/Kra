name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  node-quality:
    name: node-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify repository quality
        run: pnpm ci:verify

  python-quality:
    name: python-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AI service dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ./services/ai[dev]

      - name: Run AI service tests
        run: python -m pytest services/ai/tests

